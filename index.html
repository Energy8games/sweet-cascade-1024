<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sweet Cascade 1024</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0a2e; }
    #game { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="err-display" style="display:none;position:fixed;bottom:0;left:0;width:100%;max-height:40%;overflow:auto;background:rgba(0,0,0,0.9);color:#ff4444;font:12px monospace;padding:10px;z-index:99999;white-space:pre-wrap"></div>
  <script>
    window.onerror=function(m,s,l,c,e){var d=document.getElementById('err-display');d.style.display='block';d.textContent+='ERR: '+m+' at '+s+':'+l+'\n'};
    window.addEventListener('unhandledrejection',function(e){var d=document.getElementById('err-display');d.style.display='block';d.textContent+='REJECT: '+(e.reason?.stack||e.reason)+'\n'});
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
